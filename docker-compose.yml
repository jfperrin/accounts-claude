services:
  app:
    build: .
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "127.0.0.1:3001:3001"
    env_file: ./server/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3001/api/auth/config"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
