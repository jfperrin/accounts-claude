server {
    if ($host = account.perrin.at) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen                    80;
    listen                    [::]:80;
    server_name               account.perrin.at;
    return                    301 https://$server_name$request_uri;
}

server {
    listen                    443 ssl;
    listen                    [::]:443 ssl;
    server_name               account.perrin.at;

    http2                     on;
    ssl_certificate           /etc/letsencrypt/live/account.perrin.at-0002/fullchain.pem; # managed by Certbot
    ssl_certificate_key       /etc/letsencrypt/live/account.perrin.at-0002/privkey.pem; # managed by Certbot
    ssl_trusted_certificate   /etc/letsencrypt/live/account.perrin.at-0002/chain.pem;
    ssl_dhparam               /etc/ssl/certs/dhparam.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers               TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256:ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_ecdh_curve            secp384r1;
    ssl_stapling              on;
    ssl_stapling_verify       on;
    ssl_session_cache         shared:SSL:1m;
    ssl_session_timeout       1440m;
    ssl_buffer_size           8k;
    add_header                Strict-Transport-Security "max-age=63072000";

    access_log                /var/log/nginx/account.access.log;
    error_log                 /var/log/nginx/account.error.log;

    location / {
        proxy_pass            http://127.0.0.1:3001;
        proxy_http_version    1.1;
        proxy_set_header      Host              $host;
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    60s;
    }

    include                   /etc/nginx/snippets/letsencrypt;
}
